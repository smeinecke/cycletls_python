name: Unit Tests

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_PATH: ./

jobs:
  unit-tests:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        # macOS runners are scarce on free tier; only run macOS for the latest
        # Python version. Linux covers the full Python matrix.
        exclude:
          - os: macos-latest
            python: '3.9'
          - os: macos-latest
            python: '3.10'
          - os: macos-latest
            python: '3.11'
          - os: macos-latest
            python: '3.12'
          - os: macos-latest
            python: '3.14'

    steps:
      - uses: actions/checkout@v7

      - name: Setup CycleTLS (Go build)
        uses: ./.github/actions/setup-cycletls

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev --extra dev

      - name: Build and start go-httpbin
        shell: bash
        run: |
          go install github.com/mccutchen/go-httpbin/v2/cmd/go-httpbin@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          go-httpbin -port 8080 &
          echo "Waiting for httpbin to become ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/get > /dev/null; then
              echo "httpbin is ready on http://localhost:8080"
              echo "HTTPBIN_URL=http://localhost:8080" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 1
          done
          echo "httpbin did not become ready."
          exit 1

      - name: Run unit tests with coverage
        run: >
          uv run pytest
          -v --color=yes -n auto --reruns=2
          -m "not live and not blocking"
          --cov=cycletls --cov-report=xml --cov-report=term-missing
          tests/

      - name: Upload coverage artifact
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

