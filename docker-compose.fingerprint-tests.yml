services:
  tlsfingerprint:
    build:
      context: ./.tlsfingerprint-server
      dockerfile: Dockerfile
    volumes:
      - ./.tlsfingerprint-server/certs:/app/certs:ro
      - ./.tlsfingerprint-server/config.json:/app/config.json:ro
      - ./.tlsfingerprint-server/blockedIPs:/app/blockedIPs
    networks:
      - fingerprint-net
    ports:
      - "443:443"
      - "443:443/udp"
      - "80:80"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --no-check-certificate https://localhost/api/clean && echo ok || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 60s

  playwright-capture:
    image: mcr.microsoft.com/playwright/python:v1.58.0-noble
    depends_on:
      tlsfingerprint:
        condition: service_healthy
    volumes:
      - ./scripts/capture_browser_fingerprints.py:/capture.py:ro
      - ./tests/integration/artifacts:/fingerprints
    networks:
      - fingerprint-net
    environment:
      - TLSFP_URL=https://tlsfingerprint
    # NOTE: Firefox version is pinned to what the Playwright image bundles.
    # Playwright's Firefox driver uses the Juggler protocol which is only in
    # Playwright's patched builds — system Firefox cannot be substituted.
    # To get a newer Firefox, bump the image tag to a newer Playwright release.
    command: >
      bash -c "pip install playwright --quiet &&
               playwright install chromium firefox webkit &&
               python /capture.py --url https://tlsfingerprint --output /fingerprints/captured.json --ignore-https-errors --headless-chrome"

networks:
  fingerprint-net:
    name: fingerprint-net
    driver: bridge
